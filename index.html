<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GM PNEUS | App Operacional</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: #f8fafc; 
            color: #000000;
            -webkit-tap-highlight-color: transparent;
        }

        /* App Mobile Styles */
        .btn-blue {
            background: #2563eb; color: #ffffff; height: 70px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; text-transform: uppercase; border-radius: 16px;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3); transition: transform 0.1s;
        }
        .btn-blue:active { transform: scale(0.97); }

        .btn-black {
            background: #0f172a; color: #ffffff; height: 70px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; text-transform: uppercase; border-radius: 16px;
        }

        .input-app {
            background: #ffffff; border: 2px solid #e2e8f0; height: 65px; border-radius: 12px;
            padding: 0 20px; font-size: 1.1rem; color: #0f172a; font-weight: 700; width: 100%; transition: all 0.2s;
        }
        .input-app:focus { border-color: #2563eb; outline: none; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        .view-section { display: none; padding-bottom: 120px; }
        .view-active { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Bottom Nav App Style - Alterado para FLEX para se adaptar à quantidade de botões */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #ffffff; border-top: 1px solid #e2e8f0;
            display: flex; justify-content: space-around;
            height: 80px; padding-bottom: env(safe-area-inset-bottom);
            z-index: 100; box-shadow: 0 -4px 20px rgba(0,0,0,0.03);
        }
        .nav-item {
            flex: 1; /* Faz o botão preencher o espaço se for o único */
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #94a3b8; font-size: 0.65rem; font-weight: 800; text-transform: uppercase;
        }
        .nav-item.active { color: #2563eb; }
        .nav-item i { font-size: 1.3rem; margin-bottom: 4px; transition: transform 0.2s; }
        .nav-item.active i { transform: translateY(-2px); }
        .hidden-nav { display: none !important; }
    </style>
</head>
<body>

    <div id="loader" class="fixed inset-0 bg-white/90 z-[999] hidden flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin"></div>
        <p id="loader-text" class="mt-4 text-[10px] font-black tracking-widest text-slate-400 uppercase">Aguarde...</p>
    </div>

    <div id="login-screen" class="fixed inset-0 bg-white flex flex-col p-8 z-[600] justify-center">
        <div class="mb-12 text-center">
            <h1 class="text-5xl font-black italic tracking-tighter text-slate-900">GM<span class="text-blue-600">PNEUS</span></h1>
            <p class="text-slate-500 font-bold uppercase text-[10px] tracking-widest mt-2">App de Produtividade</p>
        </div>
        <div class="space-y-4">
            <input id="login-usuario" type="text" placeholder="Usuário (nome.sobrenome)" class="input-app uppercase text-center text-sm">
            <input id="login-senha" type="password" placeholder="Senha" class="input-app text-center text-sm">
            <button onclick="fazerLogin()" class="btn-blue w-full mt-4">ENTRAR</button>
        </div>
    </div>

    <div id="app-content" class="hidden min-h-screen">
        
        <header class="p-5 flex justify-between items-center bg-slate-900 text-white sticky top-0 z-50 shadow-md">
            <div>
                <h1 class="text-xl font-black italic">GM<span class="text-blue-400">PNEUS</span></h1>
                <div class="flex items-center gap-2 mt-1">
                    <span id="role-display" class="bg-blue-600 px-2 py-0.5 rounded text-[8px] font-bold text-white uppercase tracking-widest"></span>
                    <span id="user-display" class="text-[10px] font-bold text-slate-300 uppercase"></span>
                </div>
            </div>
            <button onclick="fazerLogout()" class="w-10 h-10 bg-slate-800 rounded-full flex items-center justify-center text-red-400 hover:bg-red-500 hover:text-white transition-colors">
                <i class="fas fa-power-off"></i>
            </button>
        </header>

        <main class="p-4 sm:p-6 max-w-lg mx-auto">
            
            <section id="view-movimentacao" class="view-section view-active">
                <h2 class="text-xl font-black text-slate-900 mb-6 uppercase">Novo Lançamento</h2>
                
                <div class="space-y-5 bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 ml-1 mb-2 block uppercase">Cliente / Empresa</label>
                        <select id="select-empresa-mov" class="input-app appearance-none text-sm"></select>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                        <div class="bg-blue-50/50 p-4 rounded-xl border border-blue-100">
                            <label class="text-[10px] font-black text-blue-600 block mb-2 text-center uppercase">Coletados (+)</label>
                            <input id="qtd-coleta" type="number" inputmode="numeric" placeholder="0" class="w-full bg-transparent text-center text-4xl font-black text-slate-900 outline-none">
                        </div>
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                            <label class="text-[10px] font-black text-slate-600 block mb-2 text-center uppercase">Total Entregue (-)</label>
                            <input id="qtd-entrega" type="number" inputmode="numeric" placeholder="0" class="w-full bg-transparent text-center text-4xl font-black text-slate-900 outline-none">
                        </div>
                        <div class="bg-red-50/60 p-4 rounded-xl border border-red-100">
                            <label class="text-[10px] font-black text-red-600 block mb-2 text-center uppercase">Recusados (-)</label>
                            <input id="qtd-recusado" type="number" inputmode="numeric" placeholder="0" class="w-full bg-transparent text-center text-4xl font-black text-slate-900 outline-none">
                        </div>
                    </div>

                    <button onclick="window.salvarMovimentacao()" class="btn-blue w-full mt-2">
                        <i class="fas fa-check mr-2"></i> Confirmar Produtividade
                    </button>
                </div>
            </section>

            <section id="view-empresas" class="view-section">
                <h2 class="text-xl font-black text-slate-900 uppercase mb-6">Transportadoras</h2>
                
                <div id="form-cliente" class="mb-6 bg-white p-5 rounded-2xl shadow-sm border border-slate-100 hidden">
                    <label class="text-[10px] font-black text-slate-400 block mb-2 uppercase">Cadastrar Nova</label>
                    <input id="cad-nome-cliente" placeholder="Razão Social" class="input-app mb-3 !h-[55px] !text-sm">
                    <button onclick="window.salvarEmpresa()" class="btn-blue w-full !h-[55px] !text-xs">
                        <i class="fas fa-plus mr-2"></i> Adicionar Cliente
                    </button>
                </div>

                <div id="lista-clientes" class="space-y-2"></div>
            </section>

            <section id="view-dashboard" class="view-section">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-black text-slate-900 uppercase">Produtividade</h2>
                    <select id="filtro-mes" onchange="renderDashboard()" class="bg-white border border-slate-200 text-slate-900 p-2 rounded-lg font-bold text-xs outline-none"></select>
                </div>

                <button onclick="gerarDocumentoPDF()" class="btn-black w-full mb-6 text-xs">
                    <i class="fas fa-file-pdf mr-2 text-blue-400"></i> Baixar Relatório (PDF)
                </button>

                <h3 class="text-xs font-black text-slate-400 uppercase mb-3 ml-1">Volume por Empresa</h3>
                <div id="tabela-mobile-saldos" class="space-y-3"></div>
            </section>

            <section id="view-equipe" class="view-section">
                <h2 class="text-xl font-black text-slate-900 uppercase mb-6">Equipe de Operação</h2>
                
                <div id="form-equipe" class="mb-6 bg-white p-5 rounded-2xl shadow-sm border border-slate-100 hidden">
                    <label class="text-[10px] font-black text-slate-400 block mb-2 uppercase">Criar Novo Acesso</label>
                    <div class="space-y-3">
                        <input id="eq-nome" type="text" placeholder="Nome" class="input-app !h-[55px] !text-sm">
                        <input id="eq-sobrenome" type="text" placeholder="Sobrenome" class="input-app !h-[55px] !text-sm">
                        <input id="eq-senha" type="password" placeholder="Senha (Mínimo 6)" class="input-app !h-[55px] !text-sm">
                        <select id="eq-cargo" class="input-app !h-[55px] !text-sm appearance-none bg-white">
                            <option value="operador">Operador (Apenas Lançamentos)</option>
                            <option value="gestor">Gestor (Acesso Total)</option>
                        </select>
                        <button onclick="window.cadastrarEquipeCompleto()" class="btn-blue w-full !h-[55px] !text-xs mt-2">
                            <i class="fas fa-user-plus mr-2"></i> Criar Login
                        </button>
                    </div>
                </div>

                <h3 class="text-xs font-black text-slate-400 uppercase mb-3 ml-1">Usuários no Sistema</h3>
                <div id="lista-equipe" class="space-y-2"></div>
            </section>

            <footer class="text-center text-[10px] font-bold text-slate-400 uppercase tracking-wide mt-8 mb-6">
                Desenvolvido por Guilheme Martins
            </footer>

        </main>

        <nav class="bottom-nav max-w-lg mx-auto">
            <button id="nav-btn-lancamento" onclick="showView('view-movimentacao', this)" class="nav-item active">
                <i class="fas fa-pen-to-square"></i><span>Lançar</span>
            </button>
            
            <button id="nav-btn-clientes" onclick="showView('view-empresas', this)" class="nav-item">
                <i class="fas fa-truck"></i><span>Clientes</span>
            </button>
            <button id="nav-btn-relatorios" onclick="showView('view-dashboard', this)" class="nav-item">
                <i class="fas fa-chart-line"></i><span>Relatórios</span>
            </button>
            <button id="nav-btn-equipe" onclick="showView('view-equipe', this)" class="nav-item">
                <i class="fas fa-users"></i><span>Equipe</span>
            </button>
        </nav>
    </div>

    <div id="pdf-master-container" style="display:none;"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZPhd2ya8EQRbDd293-rijw6ODPEzo6zc",
            authDomain: "controle-de-o.firebaseapp.com",
            projectId: "controle-de-o",
            storageBucket: "controle-de-o.firebasestorage.app",
            messagingSenderId: "290573053792",
            appId: "1:290573053792:web:67389009de6ee160643805"
        };

        const app = initializeApp(firebaseConfig);
        const secondaryApp = initializeApp(firebaseConfig, "Secondary");
        const db = getFirestore(app);
        const auth = getAuth(app);
        const secondaryAuth = getAuth(secondaryApp);
        const DOMINIO = "@gmcollect.com";
        const SUPREMO = "amg.gui@gmail.com"; 

        window.showLoader = (s, text = 'Aguarde...') => {
            document.getElementById('loader-text').innerText = text;
            document.getElementById('loader').classList.toggle('hidden', !s);
        };

        window.fazerLogin = () => {
            let u = document.getElementById('login-usuario').value.trim().toLowerCase();
            if(!u.includes('@')) u += DOMINIO;
            window.showLoader(true, 'Autenticando...');
            signInWithEmailAndPassword(auth, u, document.getElementById('login-senha').value).catch(() => {
                alert("Usuário ou senha inválidos.");
                window.showLoader(false);
            });
        };

        window.fazerLogout = () => signOut(auth);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "usuarios", user.uid));
                const d = userDoc.exists() ? userDoc.data() : { cargo: 'operador', nome: user.email.split('@')[0] };
                
                // Define as permissões
                window.userRole = (user.email.toLowerCase() === SUPREMO || d.cargo === 'gestor') ? 'gestor' : 'operador';
                if(user.email.toLowerCase() === SUPREMO) window.userRole = 'supremo'; 
                
                window.userData = d;
                
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                document.getElementById('user-display').innerText = d.nome;
                
                let displayCargo = window.userRole === 'supremo' ? 'MASTER' : window.userRole;
                document.getElementById('role-display').innerText = displayCargo;
                
                // ----------------------------------------------------
                // SISTEMA DE BLOQUEIO TOTAL (OPERADOR VS GESTOR)
                // ----------------------------------------------------
                if (window.userRole === 'gestor' || window.userRole === 'supremo') {
                    // Gestor vê os formulários administrativos
                    document.getElementById('form-cliente').classList.remove('hidden');
                    document.getElementById('form-equipe').classList.remove('hidden');
                    // Gestor vê todos os botões do menu inferior
                    document.getElementById('nav-btn-clientes').classList.remove('hidden-nav');
                    document.getElementById('nav-btn-relatorios').classList.remove('hidden-nav');
                    document.getElementById('nav-btn-equipe').classList.remove('hidden-nav');
                } else {
                    // Operador NÃO vê os formulários
                    document.getElementById('form-cliente').classList.add('hidden');
                    document.getElementById('form-equipe').classList.add('hidden');
                    // Operador NÃO vê as abas do menu (Some completamente da tela)
                    document.getElementById('nav-btn-clientes').classList.add('hidden-nav');
                    document.getElementById('nav-btn-relatorios').classList.add('hidden-nav');
                    document.getElementById('nav-btn-equipe').classList.add('hidden-nav');
                    
                    // Se tentar burlar, força o retorno para Lançamento
                    showView('view-movimentacao', document.getElementById('nav-btn-lancamento'));
                }
                
                conectarDados();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('app-content').classList.add('hidden');
            }
            window.showLoader(false);
        });

        function conectarDados() {
            onSnapshot(collection(db, "empresas"), (snap) => {
                window.empresas = snap.docs.map(d => ({id: d.id, ...d.data()}));
                atualizarUI();
            });
            onSnapshot(collection(db, "movimentacoes"), (snap) => {
                window.movimentacoes = snap.docs.map(d => ({id: d.id, ...d.data()}));
                if(window.userRole !== 'operador') renderDashboard(); // Operador não processa gráficos
            });
            onSnapshot(collection(db, "usuarios"), (snap) => {
                if(window.userRole === 'operador') return; // Segurança extra
                const cont = document.getElementById('lista-equipe');
                cont.innerHTML = '';
                snap.docs.forEach(u => {
                    const d = u.data();
                    cont.innerHTML += `
                        <div class="bg-white p-4 rounded-xl flex justify-between items-center border border-slate-100 shadow-sm">
                            <span class="font-bold text-sm text-slate-800 uppercase">${d.nome} ${d.sobrenome || ''}</span>
                            <span class="text-[10px] font-black text-blue-500 uppercase">${d.cargo}</span>
                        </div>`;
                });
            });
        }

        window.salvarMovimentacao = async () => {
            const id = document.getElementById('select-empresa-mov').value;
            const c = parseInt(document.getElementById('qtd-coleta').value) || 0;
            const totalEntrega = parseInt(document.getElementById('qtd-entrega').value) || 0;
            const r = parseInt(document.getElementById('qtd-recusado').value) || 0;
            const e = Math.max(totalEntrega - r, 0);
            if(!id || (c===0 && totalEntrega===0 && r===0)) return alert("Preencha cliente e quantidade.");
            if(r > totalEntrega) return alert("Recusados não pode ser maior que o total entregue.");
            
            window.showLoader(true, 'Salvando...');
            await addDoc(collection(db, "movimentacoes"), {
                empresaId: id, coleta: c, entrega: e, entregaTotal: totalEntrega, recusados: r, mes: new Date().getMonth()+1, ano: new Date().getFullYear(),
                registradoPor: window.userData.nome, data: new Date().toISOString()
            });
            document.getElementById('qtd-coleta').value = ''; 
            document.getElementById('qtd-entrega').value = '';
            document.getElementById('qtd-recusado').value = '';
            window.showLoader(false);
            alert("Lançamento Registrado!");
        };

        window.cadastrarEquipeCompleto = async () => {
            if (window.userRole === 'operador') return alert("Acesso Negado.");

            const n = document.getElementById('eq-nome').value.trim();
            const s = document.getElementById('eq-sobrenome').value.trim();
            const p = document.getElementById('eq-senha').value;
            const c = document.getElementById('eq-cargo').value;
            const email = (n + "." + s).toLowerCase() + DOMINIO;

            if(!n || p.length < 6) return alert("Preencha o nome e uma senha com mínimo de 6 caracteres.");

            window.showLoader(true, "Criando Login...");
            try {
                const cred = await createUserWithEmailAndPassword(secondaryAuth, email, p);
                await setDoc(doc(db, "usuarios", cred.user.uid), { nome: n, sobrenome: s, cargo: c, email: email });
                await signOut(secondaryAuth);
                
                alert("Funcionário cadastrado com sucesso!");
                document.getElementById('eq-nome').value = '';
                document.getElementById('eq-sobrenome').value = '';
                document.getElementById('eq-senha').value = '';
            } catch (err) {
                alert("Erro ao cadastrar: " + err.message);
            }
            window.showLoader(false);
        };

        window.salvarEmpresa = async () => {
            if (window.userRole === 'operador') return alert("Acesso Negado.");

            const n = document.getElementById('cad-nome-cliente').value.trim().toUpperCase();
            if(!n) return;
            
            window.showLoader(true, 'Salvando...');
            await addDoc(collection(db, "empresas"), { nome: n });
            document.getElementById('cad-nome-cliente').value = '';
            window.showLoader(false);
            alert("Cliente cadastrado!");
        };

        window.removerCliente = async (id) => { 
            if (window.userRole === 'operador') return;
            if(confirm("Apagar cliente do sistema?")) await deleteDoc(doc(db, "empresas", id)); 
        };
    </script>

    <script>
        function showView(v, btn) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('view-active'));
            document.getElementById(v).classList.add('view-active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(btn) btn.classList.add('active');
            window.scrollTo(0,0);
        }

        function atualizarUI() {
            const sel = document.getElementById('select-empresa-mov');
            sel.innerHTML = '<option value="">-- ESCOLHER CLIENTE --</option>';
            window.empresas?.sort((a,b)=>a.nome.localeCompare(b.nome)).forEach(e => sel.innerHTML += `<option value="${e.id}">${e.nome}</option>`);
            
            if(window.userRole === 'operador') return; // Operador não precisa renderizar a lista de clientes com lixeira
            
            const cont = document.getElementById('lista-clientes');
            cont.innerHTML = '';
            window.empresas?.sort((a,b)=>a.nome.localeCompare(b.nome)).forEach(e => {
                const del = `<button onclick="window.removerCliente('${e.id}')" class="text-red-500 p-2"><i class="fas fa-trash"></i></button>`;
                cont.innerHTML += `<div class="bg-white p-4 rounded-xl flex justify-between items-center border border-slate-100 shadow-sm font-bold text-sm text-slate-800 uppercase">${e.nome}${del}</div>`;
            });
        }

        function numero(valor) {
            return Number(valor) || 0;
        }

        function getRecusados(mov) {
            return numero(mov.recusados);
        }

        function getEntreguesAprovados(mov) {
            const recusados = getRecusados(mov);
            const totalEntregue = mov.entregaTotal === undefined ? numero(mov.entrega) : numero(mov.entregaTotal);
            return Math.max(totalEntregue - recusados, 0);
        }

        function renderDashboard() {
            carregarFiltros();
            const mes = parseInt(document.getElementById('filtro-mes').value);
            const ano = new Date().getFullYear();
            const cont = document.getElementById('tabela-mobile-saldos');
            cont.innerHTML = '';
            
            window.empresas?.forEach(emp => {
                const movs = window.movimentacoes.filter(m => m.empresaId == emp.id && m.mes == mes && m.ano == ano);
                const c = movs.reduce((a,b)=>a+(Number(b.coleta)||0),0);
                const e = movs.reduce((a,b)=>a+getEntreguesAprovados(b),0);
                const r = movs.reduce((a,b)=>a+getRecusados(b),0);
                const volumeCarregado = c;
                const totalAtividade = c + e + r;
                
                if(totalAtividade > 0) {
                    cont.innerHTML += `
                        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                            <div class="flex justify-between items-center mb-2 border-b border-slate-100 pb-2">
                                <span class="font-black text-sm text-slate-800 uppercase">${emp.nome}</span>
                                <span class="text-xs font-black text-blue-600 uppercase">Volume: ${volumeCarregado}</span>
                            </div>
                            <div class="grid grid-cols-3 gap-2 text-center text-[10px] font-bold text-slate-500 uppercase">
                                <span>Coletados: <b class="text-slate-900 text-sm">${c}</b></span>
                                <span>Entregues: <b class="text-slate-900 text-sm">${e}</b></span>
                                <span>Recusados: <b class="text-red-600 text-sm">${r}</b></span>
                            </div>
                        </div>
                    `;
                }
            });
        }

        function carregarFiltros() {
            const mS = document.getElementById('filtro-mes');
            if(mS.innerHTML !== "") return;
            const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
            meses.forEach((m,i)=>mS.innerHTML+=`<option value="${i+1}" ${new Date().getMonth()==i?'selected':''}>${m}</option>`);
        }

        window.gerarDocumentoPDF = () => {
            window.showLoader(true, 'Gerando PDF...');
            
            const mesNome = document.getElementById('filtro-mes').options[document.getElementById('filtro-mes').selectedIndex].text;
            const mesNum = parseInt(document.getElementById('filtro-mes').value);
            const ano = new Date().getFullYear();
            
            let totalC = 0, totalE = 0, totalR = 0, produtividadeGeral = 0;
            let linhasClientes = '';
            let linhasEquipe = '';
            
            window.empresas?.forEach(emp => {
                const movs = window.movimentacoes.filter(m => m.empresaId == emp.id && m.mes == mesNum && m.ano == ano);
                const c = movs.reduce((a,b)=>a+(Number(b.coleta)||0),0);
                const e = movs.reduce((a,b)=>a+getEntreguesAprovados(b),0);
                const r = movs.reduce((a,b)=>a+getRecusados(b),0);
                const t = c;
                const totalAtividade = c + e + r;
                totalC += c; totalE += e; totalR += r; produtividadeGeral += t;
                
                if(totalAtividade > 0) {
                    linhasClientes += `<tr style="background-color: #ffffff;"><td style="padding:10px 12px; border-bottom:1px solid #e2e8f0; font-size:12px; font-weight:bold;">${emp.nome.toUpperCase()}</td><td style="padding:10px 12px; border-bottom:1px solid #e2e8f0; font-size:12px; text-align:center;">${c}</td><td style="padding:10px 12px; border-bottom:1px solid #e2e8f0; font-size:12px; text-align:center;">${e}</td><td style="padding:10px 12px; border-bottom:1px solid #e2e8f0; font-size:12px; text-align:center; color:#dc2626; font-weight:bold;">${r}</td><td style="padding:10px 12px; border-bottom:1px solid #e2e8f0; font-size:12px; text-align:right; font-weight:900; color:#2563eb;">${t} Pneus</td></tr>`;
                }
            });

            if(linhasClientes === '') linhasClientes = `<tr><td colspan="5" style="text-align:center; padding: 20px;">Nenhuma produtividade registrada neste mês.</td></tr>`;

            const perfMap = {};
            window.movimentacoes.filter(m => m.mes == mesNum && m.ano == ano).forEach(m => {
                const u = m.registradoPor || "Sistema";
                if(!perfMap[u]) perfMap[u] = { c: 0, e: 0, r: 0 };
                perfMap[u].c += Number(m.coleta)||0; perfMap[u].e += getEntreguesAprovados(m); perfMap[u].r += getRecusados(m);
            });
            Object.entries(perfMap).forEach(([nome, d]) => {
                linhasEquipe += `<tr style="background-color: #ffffff;"><td style="padding:10px 12px; border-bottom:1px solid #e2e8f0; font-size:12px; font-weight:bold; text-transform:uppercase;">${nome}</td><td style="padding:10px 12px; border-bottom:1px solid #e2e8f0; font-size:12px; text-align:center;">${d.c}</td><td style="padding:10px 12px; border-bottom:1px solid #e2e8f0; font-size:12px; text-align:center;">${d.e}</td><td style="padding:10px 12px; border-bottom:1px solid #e2e8f0; font-size:12px; text-align:center; color:#dc2626; font-weight:bold;">${d.r}</td><td style="padding:10px 12px; border-bottom:1px solid #e2e8f0; font-size:12px; text-align:right; font-weight:900; color:#0f172a;">${d.c + d.e + d.r}</td></tr>`;
            });
            if(linhasEquipe === '') linhasEquipe = `<tr><td colspan="5" style="text-align:center; padding: 20px;">Sem registros de equipe.</td></tr>`;

            const htmlString = `
                <div style="font-family: Arial, sans-serif; padding: 40px; color: #0f172a; background: #ffffff; width: 750px; box-sizing: border-box;">
                    <div style="display:flex; justify-content:space-between; align-items:flex-end; border-bottom:3px solid #0f172a; padding-bottom:15px; margin-bottom:25px;">
                        <div>
                            <h1 style="margin:0; font-size:28px; font-weight:900; font-style:italic;">GM<span style="color:#2563eb">PNEUS</span></h1>
                            <p style="margin:5px 0 0 0; font-size:11px; font-weight:bold; color:#64748b; text-transform:uppercase;">Relatório de Produtividade Operacional</p>
                        </div>
                        <div style="text-align:right; font-size:11px; font-weight:bold; color:#475569;">
                            <p style="margin:0;">Ref: ${mesNome.toUpperCase()} / ${ano}</p>
                            <p style="margin:2px 0 0 0;">Emitido: ${new Date().toLocaleString('pt-BR')}</p>
                        </div>
                    </div>

                    <div style="display:flex; gap:15px; margin-bottom:30px;">
                        <div style="flex:1; background:#f8fafc; border:1px solid #cbd5e1; padding:15px; border-radius:8px; text-align:center;">
                            <p style="margin:0; font-size:10px; color:#64748b; font-weight:bold; text-transform:uppercase;">Total Coletado</p>
                            <h2 style="margin:5px 0 0 0; color:#0f172a; font-size:24px;">${totalC}</h2>
                        </div>
                        <div style="flex:1; background:#f8fafc; border:1px solid #cbd5e1; padding:15px; border-radius:8px; text-align:center;">
                            <p style="margin:0; font-size:10px; color:#64748b; font-weight:bold; text-transform:uppercase;">Total Entregue</p>
                            <h2 style="margin:5px 0 0 0; color:#0f172a; font-size:24px;">${totalE}</h2>
                        </div>
                        <div style="flex:1; background:#fff1f2; border:1px solid #fecdd3; padding:15px; border-radius:8px; text-align:center;">
                            <p style="margin:0; font-size:10px; color:#dc2626; font-weight:bold; text-transform:uppercase;">Total Recusado</p>
                            <h2 style="margin:5px 0 0 0; color:#dc2626; font-size:24px;">${totalR}</h2>
                        </div>
                        <div style="flex:1; background:#eff6ff; border:2px solid #2563eb; padding:15px; border-radius:8px; text-align:center;">
                            <p style="margin:0; font-size:10px; color:#2563eb; font-weight:bold; text-transform:uppercase;">Volume Total Carregado</p>
                            <h2 style="margin:5px 0 0 0; color:#2563eb; font-size:24px;">${produtividadeGeral}</h2>
                        </div>
                    </div>

                    <h3 style="font-size:13px; text-transform:uppercase; border-left:4px solid #0f172a; padding-left:8px; color:#0f172a; margin-bottom: 10px;">Volume de Trabalho por Empresa</h3>
                    <table style="width:100%; border-collapse:collapse; margin-bottom:30px; border:1px solid #e2e8f0;">
                        <thead>
                            <tr>
                                <th style="background:#0f172a; color:#fff; padding:12px; font-size:11px; text-transform:uppercase; text-align:left;">Cliente / Transportadora</th>
                                <th style="background:#0f172a; color:#fff; padding:12px; font-size:11px; text-transform:uppercase; text-align:center;">Pneus Coletados</th>
                                <th style="background:#0f172a; color:#fff; padding:12px; font-size:11px; text-transform:uppercase; text-align:center;">Pneus Entregues</th>
                                <th style="background:#0f172a; color:#fff; padding:12px; font-size:11px; text-transform:uppercase; text-align:center;">Pneus Recusados</th>
                                <th style="background:#0f172a; color:#fff; padding:12px; font-size:11px; text-transform:uppercase; text-align:right;">Total Carregado</th>
                            </tr>
                        </thead>
                        <tbody>${linhasClientes}</tbody>
                    </table>

                    <div style="page-break-inside: avoid;">
                        <h3 style="font-size:13px; text-transform:uppercase; border-left:4px solid #2563eb; padding-left:8px; color:#0f172a; margin-bottom: 10px;">Desempenho da Equipe (Produtividade)</h3>
                        <table style="width:100%; border-collapse:collapse; margin-bottom:30px; border:1px solid #e2e8f0;">
                            <thead>
                                <tr>
                                    <th style="background:#f1f5f9; color:#0f172a; border-bottom:2px solid #cbd5e1; padding:12px; font-size:11px; text-transform:uppercase; text-align:left;">Operador Responsável</th>
                                    <th style="background:#f1f5f9; color:#0f172a; border-bottom:2px solid #cbd5e1; padding:12px; font-size:11px; text-transform:uppercase; text-align:center;">Coletas (Vol.)</th>
                                    <th style="background:#f1f5f9; color:#0f172a; border-bottom:2px solid #cbd5e1; padding:12px; font-size:11px; text-transform:uppercase; text-align:center;">Entregas (Vol.)</th>
                                    <th style="background:#f1f5f9; color:#0f172a; border-bottom:2px solid #cbd5e1; padding:12px; font-size:11px; text-transform:uppercase; text-align:center;">Recusados (Vol.)</th>
                                    <th style="background:#f1f5f9; color:#0f172a; border-bottom:2px solid #cbd5e1; padding:12px; font-size:11px; text-transform:uppercase; text-align:right;">Pneus Movimentados</th>
                                </tr>
                            </thead>
                            <tbody>${linhasEquipe}</tbody>
                        </table>
                    </div>

                    <div style="margin-top: 80px; text-align:center; width:300px; margin-left:auto; margin-right:auto;">
                        <div style="border-top:1px solid #000; padding-top:10px; font-size:11px; font-weight:bold; text-transform:uppercase;">Visto / Conferência</div>
                    </div>

                    <p style="margin:45px 0 0 0; text-align:center; font-size:10px; font-weight:bold; color:#64748b; text-transform:uppercase; letter-spacing:0.5px;">Desenvolvido por Guilheme Martins</p>
                </div>
            `;

            const opt = { 
                margin: [10, 0, 10, 0], 
                filename: `Produtividade_GM_${mesNome}.pdf`, 
                image: { type: 'jpeg', quality: 1 }, 
                html2canvas: { scale: 2, useCORS: true, logging: false }, 
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } 
            };

            html2pdf().set(opt).from(htmlString).save().then(() => {
                window.showLoader(false);
            });
        };
    </script>
</body>
</html>
